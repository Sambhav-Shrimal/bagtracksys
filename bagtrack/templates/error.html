{% extends "base.html" %}

{% block title %}Error {{ error_code }}{% endblock %}

{% block content %}
<div class="empty-state" style="padding-top: 5rem;">
    <div class="empty-icon" style="font-size: 6rem;">
        {% if error_code == 404 %}🔍{% else %}⚠️{% endif %}
    </div>
    
    <h1 style="font-family: var(--font-display); font-size: 3rem; color: var(--color-accent); margin-bottom: 1rem;">
        ERROR {{ error_code }}
    </h1>
    
    <div class="empty-message" style="font-size: 1.25rem;">
        {{ error_message }}
    </div>
    
    <div class="btn-group mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-primary">
            Go to Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-secondary">
            Go Back
        </a>
    </div>
</div>
{% endblock %}
